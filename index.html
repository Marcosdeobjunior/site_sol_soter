<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sol de Sóter</title>
  <script>
    (function () {
      var allow = sessionStorage.getItem("soter_allow_index");
      if (allow !== "1") {
        window.location.replace("apresentacao.html");
        return;
      }
      sessionStorage.removeItem("soter_allow_index");
    }());
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body data-page="home">
  <canvas id="bg-canvas"></canvas>
  <div data-app-header></div>

  <main class="app-content">
    <section class="hero">
      <p class="hero-eyebrow">✦ ESPAÇO PESSOAL ✦</p>
      <h1><em>Sól</em> de Sóter</h1>
      <p class="hero-subtitle">O universo que vive em você</p>
    </section>

    <section class="cards-grid">
      <article class="card">
        <h2>Biblioteca</h2>
        <p>Livros, filmes e mangás em um só lugar.</p>
      </article>
      <article class="card">
        <h2>Pessoal</h2>
        <p>Sonhos, viagens, wishlist e finanças.</p>
      </article>
      <article class="card">
        <h2>Planejamento</h2>
        <p>Tarefas, metas e progresso diário.</p>
      </article>
    </section>
  </main>
  <div data-app-footer></div>

  <script src="js/app-shell.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
